name: Build and deploy static .NET publish output to GitHub Pages

# WARNING: GitHub Pages only serves static files. This workflow will deploy whatever
# static files are produced by `dotnet publish` (for example, a Blazor WASM app's
# wwwroot). Server-side ASP.NET MVC views (Razor executed on the server) will not
# be rendered on GitHub Pages. If your app is server-side MVC, convert to Blazor
# WASM or produce a static export before using Pages.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./StockChartsMvc.csproj

      - name: Publish
        run: dotnet publish ./StockChartsMvc.csproj -c Release -o ./publish

      - name: Determine publish path
        id: publishpath
        run: |
          if [ -d ./publish/wwwroot ]; then
            echo "PUBLISH_PATH=./publish/wwwroot" >> $GITHUB_ENV
          elif [ -d ./publish ]; then
            echo "PUBLISH_PATH=./publish" >> $GITHUB_ENV
          else
            echo "No publish output found" >&2
            exit 1
          fi
          echo "Publish path is $PUBLISH_PATH"

      - name: Set base href for project pages (optional)
        if: always()
        run: |
          PUBLISH="$PUBLISH_PATH"
          INDEX="$PUBLISH/index.html"
          if [ -f "$INDEX" ]; then
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            echo "Setting <base href> to /${REPO_NAME}/ in $INDEX"
            sed -i "s|<base href=\"/\">|<base href=\"/${REPO_NAME}/\">|g" "$INDEX" || true
          else
            echo "$INDEX not found — skipping base href fix"
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: ${{ env.PUBLISH_PATH }}

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1